before_script:
  - $env:Path += ";C:\Users\gandh\AppData\Local\Programs\Python\Python315"
  - $env:Path += ";C:\Users\gandh\AppData\Local\Programs\Python\Python315\Scripts"
  - python --version
default:
  tags:
    - docker

stages:
  - format
  - lint
  - type_check
  - test
  - coverage
  - audit

variables:
  RUFF_VERSION: "0.12.0"

format:
  stage: format
  script:
    - python -m pip install "ruff==0.12.0"
    - python -m ruff format --check .

lint:
  stage: lint
  script:
    - python -m pip install "ruff==0.12.0"
    - python -m ruff check .

type_check:
  stage: type_check
  script:
    - python -m pip install mypy
    - mypy .
  allow_failure: true

test:
  stage: test
  script:
    - python -m pip install pytest
    - pytest

coverage:
  stage: coverage
  script:
    - python -m pip install pytest pytest-cov
    - pytest --cov=. --cov-report=term
  allow_failure: true

dependency_audit:
  stage: audit
  script:
    - python -m pip install pip-audit
    - pip-audit
  allow_failure: true