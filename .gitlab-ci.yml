stages:
  - lint
  - typecheck

lint:
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .

typecheck:
  image: python:3.11
  script:
    - pip install mypy
    - mypy .

stages:
  - lint
  - typecheck
  - security

secret_scan:
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  stage: security
  script:
    - gitleaks detect --source . --verbose    
stages:
  - audit

dependency_audit:
  image: python:3.11
  stage: audit
  before_script:
    - pip install pip-audit
  script:
    - pip-audit    