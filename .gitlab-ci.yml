stages:
  - lint
  - typecheck
  - audit

lint:
  image: python:3.11
  stage: lint
  before_script:
    - pip install ruff
  script:
    - ruff check .

typecheck:
  image: python:3.11
  stage: typecheck
  before_script:
    - pip install mypy
  script:
    - mypy . || true

dependency_audit:
  image: python:3.11
  stage: audit
  before_script:
    - pip install pip-audit
  script:
    - pip-audit || true
stages:
  - lint
  - typecheck
  - audit
  - test

coverage:
  image: python:3.11
  stage: test
  before_script:
    - pip install pytest pytest-cov
  script:
    - pytest --cov=. --cov-report=term    
secret_scan:
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  stage: audit
  script:
    - gitleaks detect --source . --no-git    