stages:
  - lint
  - typecheck

lint:
  image: python:3.11
  script:
    - pip install ruff
    - ruff check .

typecheck:
  image: python:3.11
  script:
    - pip install mypy
    - mypy .

stages:
  - lint
  - typecheck
  - security

secret_scan:
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  stage: security
  script:
    - gitleaks detect --source . --verbose    