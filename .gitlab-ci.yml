stages:
  - format
  - lint
  - type_check
  - test
  - coverage
  - audit

format:
  image: python:3.11
  stage: format
  before_script:
    - pip install ruff
  script:
    - ruff format --check .

lint:
  image: python:3.11
  stage: lint
  before_script:
    - pip install ruff
  script:
    - ruff check .

type_check:
  image: python:3.11
  stage: type_check
  before_script:
    - pip install mypy
  script:
    - mypy . || true

test:
  image: python:3.11
  stage: test
  before_script:
    - pip install pytest
  script:
    - pytest

coverage:
  image: python:3.11
  stage: coverage
  before_script:
    - pip install pytest pytest-cov
  script:
    - pytest --cov=. --cov-report=term

dependency_audit:
  image: python:3.11
  stage: audit
  before_script:
    - pip install pip-audit
  script:
    - pip-audit || true

secret_scan:
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  stage: audit
  script:
    - gitleaks detect --source . --no-git