stages:
  - lint
  - typecheck
  - audit

lint:
  image: python:3.11
  stage: lint
  before_script:
    - pip install ruff
  script:
    - ruff check .

typecheck:
  image: python:3.11
  stage: typecheck
  before_script:
    - pip install mypy
  script:
    - mypy . || true

dependency_audit:
  image: python:3.11
  stage: audit
  before_script:
    - pip install pip-audit
  script:
    - pip-audit || true